name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build projects
        run: ./gradlew --no-daemon buildAllVersionedMods --stacktrace

      - name: Upload Forge 1.20.1 jar
        uses: actions/upload-artifact@v4
        with:
          name: froggy-forge-1.20.1
          path: |
            versions/1.20.1-forge/build/libs/*.jar
            !versions/1.20.1-forge/build/libs/*-sources.jar
            !versions/1.20.1-forge/build/libs/*-dev.jar
            !versions/1.20.1-forge/build/libs/*-javadoc.jar
          if-no-files-found: error

      - name: Upload NeoForge 1.21.1 jar
        uses: actions/upload-artifact@v4
        with:
          name: froggy-neoforge-1.21.1
          path: |
            versions/1.21.1-neoforge/build/libs/*.jar
            !versions/1.21.1-neoforge/build/libs/*-sources.jar
            !versions/1.21.1-neoforge/build/libs/*-dev.jar
            !versions/1.21.1-neoforge/build/libs/*-javadoc.jar
          if-no-files-found: error