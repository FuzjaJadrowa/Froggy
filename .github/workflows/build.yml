name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build projects
        run: ./gradlew --no-daemon build --stacktrace

      - name: Upload fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: template-fabric
          path: |
            src/fabric/build/libs/*.jar
            !src/fabric/build/libs/*-sources.jar
            !src/fabric/build/libs/*-dev.jar
            !src/fabric/build/libs/*-javadoc.jar
          if-no-files-found: error

      - name: Upload neoforge jar
        uses: actions/upload-artifact@v4
        with:
          name: template-neoforge
          path: |
            src/neoforge/build/libs/*.jar
            !src/neoforge/build/libs/*-sources.jar
            !src/neoforge/build/libs/*-dev.jar
            !src/neoforge/build/libs/*-javadoc.jar
          if-no-files-found: error